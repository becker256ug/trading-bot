<!DOCTYPE html>
<html>
<head>
    <title>MT5 Trading Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 20px;
        }

        .box {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        select, button {
            padding: 10px;
            margin: 5px;
        }

        button {
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 10px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #334155;
            padding: 8px;
        }
    </style>
</head>

<body>

<h2>🚀 MT5 Trading Dashboard</h2>

<div class="box">

    <label>Symbol:</label>
    <select id="symbol">
        <option>BTCUSDm</option>
        <option>EURUSD</option>
        <option>XAUUSD</option>
    </select>

    <button onclick="startBot()">START BOT</button>
    <button onclick="loadPositions()">REFRESH POSITIONS</button>

</div>


<div class="box">
    <h3>📊 Bot Output</h3>
    <pre id="output">Waiting...</pre>
</div>


<div class="box">
    <h3>📈 Open Positions</h3>
    <table>
        <thead>
            <tr>
                <th>Ticket</th>
                <th>Symbol</th>
                <th>Type</th>
                <th>Volume</th>
                <th>Profit</th>
            </tr>
        </thead>
        <tbody id="positions"></tbody>
    </table>
</div>


<script>

async function startBot() {

    let symbol = document.getElementById("symbol").value;

    let res = await fetch("/start", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({symbol})
    });

    let data = await res.json();

    document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);
}


async function loadPositions() {

    let res = await fetch("/positions");
    let data = await res.json();

    let table = document.getElementById("positions");
    table.innerHTML = "";

    data.forEach(p => {

        table.innerHTML += `
            <tr>
                <td>${p.ticket}</td>
                <td>${p.symbol}</td>
                <td>${p.type}</td>
                <td>${p.volume}</td>
                <td>${p.profit}</td>
            </tr>
        `;
    });
}

</script>

</body>
</html>
